<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="200" fill="#0A0A0A"/>
  <rect x="0" y="199" width="860" height="1" fill="#21262d"/>
  
  <!-- Grid dot pattern -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.5" fill="#E8FF47" opacity="0.08"/>
  </pattern>
  <rect width="860" height="200" fill="url(#dots)"/>

  <!-- Corner marks -->
  <line x1="40" y1="24" x2="60" y2="24" stroke="#E8FF47" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="24" x2="40" y2="44" stroke="#E8FF47" stroke-width="1" opacity="0.4"/>
  <line x1="820" y1="24" x2="800" y2="24" stroke="#E8FF47" stroke-width="1" opacity="0.4"/>
  <line x1="820" y1="24" x2="820" y2="44" stroke="#E8FF47" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="176" x2="60" y2="176" stroke="#E8FF47" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="176" x2="40" y2="156" stroke="#E8FF47" stroke-width="1" opacity="0.4"/>
  <line x1="820" y1="176" x2="800" y2="176" stroke="#E8FF47" stroke-width="1" opacity="0.4"/>
  <line x1="820" y1="176" x2="820" y2="156" stroke="#E8FF47" stroke-width="1" opacity="0.4"/>

  <!-- Studio name -->
  <text x="430" y="88" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#E8FF47" letter-spacing="12">V I R A   S T U D I O</text>

  <!-- Divider line -->
  <line x1="330" y1="105" x2="530" y2="105" stroke="#E8FF47" stroke-width="0.5" opacity="0.3"/>

  <!-- Tagline -->
  <text x="430" y="126" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#555" letter-spacing="4">DESIGN · DEVELOPMENT · STRATEGY</text>

  <!-- System label -->
  <text x="430" y="158" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#333" letter-spacing="2">CHENNAI, INDIA · EST. 2024 · FOUNDER-LED</text>
</svg>
